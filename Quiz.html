<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Application</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="quiz-container">

    <h1>Quiz Application</h1>

    <div id="quiz">

        <h2 id="question"></h2>

        <div class="options">

            <label>
                <input type="radio" name="answer" value="a">
                <span id="a_text"></span>
            </label>

            <label>
                <input type="radio" name="answer" value="b">
                <span id="b_text"></span>
            </label>

            <label>
                <input type="radio" name="answer" value="c">
                <span id="c_text"></span>
            </label>

            <label>
                <input type="radio" name="answer" value="d">
                <span id="d_text"></span>
            </label>

        </div>

        <button id="submit">Next</button>

    </div>

</div>

<script>

const quizData = [
{
question: "Which language styles web pages?",
a: "HTML",
b: "CSS",
c: "Java",
d: "Python",
correct: "b"
},
{
question: "Which language makes websites interactive?",
a: "HTML",
b: "CSS",
c: "JavaScript",
d: "SQL",
correct: "c"
},
{
question: "HTML stands for?",
a: "Hyper Text Markup Language",
b: "Home Tool Markup Language",
c: "Hyper Transfer Language",
d: "High Text Machine Language",
correct: "a"
}
];

const question = document.getElementById("question");
const answers = document.querySelectorAll("input[name='answer']");

const aText = document.getElementById("a_text");
const bText = document.getElementById("b_text");
const cText = document.getElementById("c_text");
const dText = document.getElementById("d_text");

const submit = document.getElementById("submit");

let currentQuiz = 0;
let score = 0;

loadQuiz();

function loadQuiz() {

clearSelection();

const current = quizData[currentQuiz];

question.innerText = current.question;

aText.innerText = current.a;
bText.innerText = current.b;
cText.innerText = current.c;
dText.innerText = current.d;
}

function clearSelection() {
answers.forEach(answer => {
answer.checked = false;
});
}

function getSelected() {

let selected = "";

answers.forEach(answer => {
if (answer.checked) {
selected = answer.value;
}
});

return selected;
}

submit.addEventListener("click", () => {

const selected = getSelected();

if (!selected) {
alert("Please select an answer");
return;
}

if (selected === quizData[currentQuiz].correct) {
score++;
}

currentQuiz++;

if (currentQuiz < quizData.length) {
loadQuiz();
}
else {
document.getElementById("quiz").innerHTML =
`
<h2>Your Score: ${score}/${quizData.length}</h2>
<button onclick="location.reload()">
Restart Quiz
</button>
`;
}

});

</script>

</body>
</html>
